server:
  extraArgs:
    - "--insecure"
    - "--repo-server-plaintext"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
  service:
    type: NodePort
  serviceGrpc:
    type: NodePort

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  volumes:
    - name: gitops
      hostPath:
        path: /local-gitops
        type: Directory
  volumeMounts:
    - name: gitops
      mountPath: /local-gitops
      readOnly: true

controller:
  extraArgs:
    - "--repo-server-plaintext"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

dex:
  enabled: false

notifications:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

applicationSet:
  enabled: true
  extraArgs:
    - "--repo-server-plaintext"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

configs:
  repositories:
    local-gitops:
      type: git
      url: /local-gitops
  cm:
    admin.enabled: "true"
    timeout.reconciliation: 180s
    statusbadge.enabled: "true"
    application.resourceTrackingMethod: annotation
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress is ready"
      if obj.status ~= nil and obj.status.loadBalancer ~= nil then
        if obj.status.loadBalancer.ingress ~= nil then
          hs.message = "Ingress has address assigned"
        end
      end
      return hs
  params:
    server.insecure: true
    reposerver.disable.tls: true
    controller.repo.server.plaintext: true
  secret:
    createSecret: true
    extra:
      server.secretkey: sikifanso
  rbac:
    policy.default: role:readonly
    policy.csv: "g, admin, role:admin\n"
